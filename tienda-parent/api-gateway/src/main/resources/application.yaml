server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/users/**

            - id: ms-catalogo
              uri: lb://ms-catalogo
              predicates:
                - Path=/api/catalogo/**

            - id: ms-catalogo-legacy
              uri: lb://ms-catalogo
              predicates:
                - Path=/api/v2/consolas/**

            - id: ms-stock
              uri: lb://ms-stock
              predicates:
                - Path=/api/stock/**

            - id: ms-pedidos
              uri: lb://ms-pedidos
              predicates:
                - Path=/api/pedidos/**

            - id: ms-pago
              uri: lb://ms-pago
              predicates:
                - Path=/api/pagos/**

            - id: ms-pago-legacy
              uri: lb://ms-pago
              predicates:
                - Path=/api/v1/pagos/**

            - id: ms-envios
              uri: lb://ms-envios
              predicates:
                - Path=/api/envios/**

            - id: ms-envios-legacy
              uri: lb://ms-envios
              predicates:
                - Path=/api/v1/envios/**

            - id: ms-direcciones
              uri: lb://ms-envios
              predicates:
                - Path=/api/direcciones/**

            - id: ms-notificaciones
              uri: lb://ms-notificaciones
              predicates:
                - Path=/notificaciones/**

            - id: ms-resenas
              uri: lb://ms-resenas
              predicates:
                - Path=/api/resenas/**

            - id: ms-resenas-legacy
              uri: lb://ms-resenas
              predicates:
                - Path=/api/v1/review/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
